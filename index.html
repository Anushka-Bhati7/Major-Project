<!DOCTYPE html>
<html>
<head>
    <title>AI Travel Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }

        #chat {
            height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
            border-bottom: 1px solid #eee;
        }

        /* Custom Scrollbar */
        #chat::-webkit-scrollbar {
            width: 5px;
        }
        #chat::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .message {
            padding: 12px;
            margin: 8px 0;
            border-radius: 15px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .user {
            background: #4facfe;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .bot {
            background: #f1f1f1;
            color: black;
            margin-right: auto;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        input:focus {
            border-color: #4facfe;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #4facfe;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
        }

        .loading {
            font-style: italic;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <h2>🌍 AI Travel Assistant</h2>

    <div id="chat">
        <div class="message bot">Hello! Ask me to plan a trip, for example: "Plan a cheap mountain trip".</div>
    </div>

    <div class="input-area">
        <input id="user-input" placeholder="Where to next?..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById("chat");
    const inputField = document.getElementById("user-input");

    async function sendMessage() {
        const messageText = inputField.value.trim();
        
        if (!messageText) return;

        // 1. Add User Message to UI
        appendMessage(messageText, 'user');
        inputField.value = ""; 

        // 2. Show "Thinking..." status
        const loadingId = "loading-" + Date.now();
        chatWindow.innerHTML += `<div id="${loadingId}" class="message bot loading">AI is thinking...</div>`;
        scrollToBottom();

        try {
            // 3. Call your LIVE Render Backend
            const response = await fetch("https://major-project-ugkg.onrender.com/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: messageText })
            });

            const data = await response.json();
            
            // Remove loading text
            document.getElementById(loadingId).remove();

            // 4. Add Bot Response to UI
            // Using .replace to make sure new lines from the AI look good in HTML
            const formattedResponse = data.explanation.replace(/\n/g, "<br>");
            appendMessage(formattedResponse, 'bot');

        } catch (error) {
            console.error("Error:", error);
            document.getElementById(loadingId).remove();
            appendMessage("⚠️ Error: Could not connect to the server. Make sure your Render backend is 'Live'!", 'bot');
        }
    }

    function appendMessage(text, sender) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        msgDiv.innerHTML = text;
        chatWindow.appendChild(msgDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Allow "Enter" key to send message
    inputField.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
